version: 2

sources:
  - name: silver
    description: "Silver layer tables created by PySpark Bronze→Silver notebook"
    database: f1_lakehouse   # cross-database read: dbt writes Gold to the Warehouse, reads Silver from the Lakehouse
    schema: dbo
    tables:
      - name: fact_laps
        identifier: silver_fact_laps
        description: "One row per lap per driver per race"
        columns:
          - name: year
            tests: [not_null]
          - name: round
            tests: [not_null]
          - name: driver_id
            tests: [not_null]
          - name: lap_number
            tests: [not_null]
          - name: lap_time
            description: "Null for in/out-laps, safety-car and incomplete laps (expected in F1 data)."
            tests:
              - not_null:
                  config:
                    # lap_time is legitimately null on in/out-laps, SC laps and incomplete
                    # laps. Tolerate up to the <=2% Silver null-rate SLA (~1968 of ~98k laps);
                    # warn on any null to surface drift, error only above the SLA threshold.
                    severity: error
                    warn_if: ">0"
                    error_if: ">1968"

      - name: fact_pitstops
        identifier: silver_fact_pitstops
        description: "One row per pit stop per driver per race"
        columns:
          - name: driver_id
            tests: [not_null]
          - name: lap
            tests: [not_null]

      - name: fact_results
        identifier: silver_fact_results
        description: "Race results: one row per driver per race"
        columns:
          - name: driver_id
            tests: [not_null]
          - name: position
            tests: [not_null]

      - name: fact_qualifying
        identifier: silver_fact_qualifying
        description: "Qualifying results"

      - name: dim_drivers
        identifier: silver_dim_drivers
        description: "Driver dimension with unified driver_id"
        columns:
          - name: driver_id
            tests: [not_null, unique]

      - name: dim_circuits
        identifier: silver_dim_circuits
        description: "Circuit dimension"
        columns:
          - name: circuit_id
            tests: [not_null, unique]

      - name: dim_constructors
        identifier: silver_dim_constructors
        description: "Constructor dimension"
        columns:
          - name: constructor_id
            tests: [not_null, unique]
