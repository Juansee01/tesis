version: 2

sources:
  - name: silver
    description: "Silver layer tables created by PySpark Bronze→Silver notebook"
    schema: dbo
    tables:
      - name: fact_laps
        description: "One row per lap per driver per race"
        columns:
          - name: year
            tests: [not_null]
          - name: round
            tests: [not_null]
          - name: driver_id
            tests: [not_null]
          - name: lap_number
            tests: [not_null]
          - name: lap_time
            tests: [not_null]

      - name: fact_pitstops
        description: "One row per pit stop per driver per race"
        columns:
          - name: driver_id
            tests: [not_null]
          - name: lap
            tests: [not_null]

      - name: fact_results
        description: "Race results: one row per driver per race"
        columns:
          - name: driver_id
            tests: [not_null]
          - name: position
            tests: [not_null]

      - name: fact_qualifying
        description: "Qualifying results"

      - name: dim_drivers
        description: "Driver dimension with unified driver_id"
        columns:
          - name: driver_id
            tests: [not_null, unique]

      - name: dim_circuits
        description: "Circuit dimension"
        columns:
          - name: circuit_id
            tests: [not_null, unique]

      - name: dim_constructors
        description: "Constructor dimension"
        columns:
          - name: constructor_id
            tests: [not_null, unique]
