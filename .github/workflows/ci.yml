name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install xgboost scikit-learn pandas numpy

      - name: Lint with flake8
        run: flake8 ingestion/ tests/ --max-line-length=100 --ignore=E501,W503

      - name: Format check with black
        run: black --check ingestion/ tests/ --line-length=100

      - name: Run tests with coverage
        run: pytest --cov=ingestion --cov-report=xml --cov-report=term-missing --cov-fail-under=80

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

  build-package:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: f1-ingestion-package
          path: dist/

  dbt-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt-fabric
        run: pip install dbt-fabric

      - name: dbt parse (syntax check)
        working-directory: dbt
        run: |
          cp profiles.yml.example ~/.dbt/profiles.yml
          dbt parse --profiles-dir ~/.dbt || echo "dbt parse needs Fabric connection — syntax check only in CI"

      - name: Check dbt project structure
        working-directory: dbt
        run: |
          test -f dbt_project.yml
          test -d models/gold
          test -f seeds/constructors_mapping.csv
          echo "dbt structure OK"
